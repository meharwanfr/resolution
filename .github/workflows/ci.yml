name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: resolution-frontend

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resolution-frontend/package-lock.json
      - run: npm ci
      - run: npm run check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resolution-frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resolution-frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  build:
    name: Build
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: resolution-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
